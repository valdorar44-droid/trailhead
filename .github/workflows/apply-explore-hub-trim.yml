name: Apply Explore Hub Trim + OTA

"on":
  workflow_dispatch:
    inputs:
      channel:
        description: "Expo update channel to publish after patching"
        required: true
        default: "both"
        type: choice
        options:
          - production
          - preview
          - both
          - none
      message:
        description: "Commit and OTA message"
        required: true
        default: "Trim Explore home hub and defer full catalog"
        type: string

permissions:
  contents: write

concurrency:
  group: apply-explore-hub-trim
  cancel-in-progress: false

jobs:
  patch-and-ota:
    name: Patch Explore home hub and optionally publish OTA
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_URL: https://api.gettrailhead.app
      EXPO_NO_TELEMETRY: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply Explore hub trim source patch
        run: python .github/scripts/apply_explore_hub_trim.py

      - name: Show source diff
        run: git diff -- 'mobile/app/(tabs)/guide.tsx'

      - name: Commit source patch when changed
        shell: bash
        run: |
          if git diff --quiet -- 'mobile/app/(tabs)/guide.tsx'; then
            echo "No Explore source changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'mobile/app/(tabs)/guide.tsx'
          git commit -m "${{ github.event.inputs.message }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Stop before OTA when requested
        if: ${{ github.event.inputs.channel == 'none' }}
        run: echo "Patched source only; OTA publish skipped."

      - name: Check EXPO_TOKEN for OTA
        if: ${{ github.event.inputs.channel != 'none' }}
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN. Add it in GitHub repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Setup Node
        if: ${{ github.event.inputs.channel != 'none' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo and EAS
        if: ${{ github.event.inputs.channel != 'none' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install mobile dependencies
        if: ${{ github.event.inputs.channel != 'none' }}
        working-directory: mobile
        run: npm ci

      - name: Typecheck mobile app
        if: ${{ github.event.inputs.channel != 'none' }}
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Publish production OTA
        if: ${{ github.event.inputs.channel == 'production' || github.event.inputs.channel == 'both' }}
        working-directory: mobile
        run: eas update --channel production --message "${{ github.event.inputs.message }}" --non-interactive

      - name: Publish preview OTA
        if: ${{ github.event.inputs.channel == 'preview' || github.event.inputs.channel == 'both' }}
        working-directory: mobile
        run: eas update --channel preview --message "${{ github.event.inputs.message }}" --non-interactive
