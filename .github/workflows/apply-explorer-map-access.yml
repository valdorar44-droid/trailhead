name: Apply Explorer Map Accesss + OTA
on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Expo update channel after patching"
        required: true
        default: "none"
        type: choice
        options:
          - production
          - preview
          - both
          - none
      message:
        description: "Commit and OTA message"
        required: true
        default: "Open Explorer map styles and keep safety layers free"
        type: string
permissions:
  contents: write
concurrency:
  group: apply-explorer-map-access
  cancel-in-progress: false
jobs:
  patch-and-ota:
    name: Patch Explorer map access and optionally publish OTA
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_URL: https://api.gettrailhead.app
      EXPO_NO_TELEMETRY: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply Explorer map access source patch
        shell: python
        run: |
          from pathlib import Path
          import re
          changed_files: set[str] = set()
          warnings: list[str] = []
          def read(path: str) -> str:
            p = Path(path)
            if not p.exists():
              raise SystemExit(f"Missing expected file: {path}")
            return p.read_text()
          def write(path: str, text: str, original: str) -> None:
            if text != original:
              Path(path).write_text(text)
              changed_files.add(path)
          def replace_required(text: str, old: str, new: str, path: str) -> str:
            if old not in text:
              raise SystemExit(f"Pattern not found in {path}: {old[:160]!r}")
            return text.replace(old, new)
          def replace_optional(text: str, old: str, new: str, path: str) -> str:
            if old in text:
              return text.replace(old, new)
            warnings.append(f"Optional pattern not found in {path}: {old[:120]!r}")
            return text
          def regex_required(text: str, pattern: str, replacement: str, path: str, count: int = 1) -> str:
            updated, n = re.subn(pattern, replacement, text, count=count, flags=re.S)
            if n == 0:
              raise SystemExit(f"Regex not found in {path}: {pattern[:180]!r}")
            return updated
          # Routing type and fallback order.
          path = "mobile/components/NativeMap/types.ts"
          text = original = read(path)
          if "'explorer-mapbox'" not in text:
            text = replace_required(
              text,
              "export type RouteProviderMode = 'trailhead' | 'extreme-mapbox';",
              "export type RouteProviderMode = 'trailhead' | 'explorer-mapbox' | 'extreme-mapbox' | 'mapbox-traffic' | 'traffic';",
              path,
            )
          write(path, text, original)
          path = "mobile/components/NativeMap/routing.ts"
          text = original = read(path)
          text = text.replace(
            " * Online priority:  Trailhead Valhalla for backroads → Mapbox → OSRM fallback",
            " * Online priority:  Trailhead Valhalla → Mapbox → OSRM fallback",
          )
          if "providerMode === 'explorer-mapbox'" not in text:
            text = replace_required(
              text,
              "if (providerMode === 'extreme-mapbox') {",
              "if (providerMode === 'explorer-mapbox' || providerMode === 'extreme-mapbox') {",
              path,
            )
          text = text.replace("EXTREME Mapbox", "Explorer Mapbox")
          text = text.replace("'EXTREME Mapbox Directions'", "'Explorer Mapbox Directions'")
          if "const wantsMapboxFirst" not in text:
            new_block = "\n".join([
              "  // C. Online: Trailhead routes first. Mapbox stays as the first fallback,",
              "  // then OSRM. Traffic-first only runs when explicitly requested.",
              "  const wantsMapboxFirst = String(providerMode) === 'mapbox-traffic' || String(providerMode) === 'traffic';",
              "  const onlineEngines = wantsMapboxFirst",
              "    ? [",
              "        () => fetchMapbox(pairs, fromIdx, mapboxToken, routeOpts),",
              "        () => fetchValhalla(pairs, fromIdx, routeOpts),",
              "        () => fetchOSRM(pairs, fromIdx, routeOpts),",
              "      ]",
              "    : [",
              "        () => fetchValhalla(pairs, fromIdx, routeOpts),",
              "        () => fetchMapbox(pairs, fromIdx, mapboxToken, routeOpts),",
              "        () => fetchOSRM(pairs, fromIdx, routeOpts),",
              "      ];",
              "",
              "  console.log('[fetchRoute] online — trying live engines in priority order');",
            ])
            text = regex_required(
              text,
              r"  // C\. Online:[\s\S]*?  console\.log\('\[fetchRoute\] online — trying live engines in priority order'\);",
              new_block,
              path,
            )
          write(path, text, original)
          # Backend plan names and offline download access.
          path = "db/store.py"
          text = original = read(path)
          if "EXPLORER_PLAN_TYPES" not in text:
            text = regex_required(
              text,
              r"def _csv_set\(value: str\) -> set\[str\]:\n    return \{[^\n]*\}\n",
              "\\g<0>\nEXPLORER_PLAN_TYPES = {\"explorer\", \"explorer_beta\", \"extreme\", \"extreme_beta\"}\n",
              path,
            )
          text = text.replace("if plan in {\"extreme\", \"extreme_beta\"}:", "if plan in EXPLORER_PLAN_TYPES:")
          text = text.replace(
            "State map downloads are free for everyone. Plan users are free for all\n    offline assets. Free users get one state routing pack, then pay credits.",
            "Trailhead-owned offline packs are free for everyone. Plan users are free\n    for any remaining paid offline assets.",
          )
          if "trailhead_owned_free" not in text:
            free_block = "\n".join([
              "      trailhead_owned_free = (",
              "          asset_type in {",
              "              \"state_map\", \"state_route\", \"state_contours\", \"state_trails\",",
              "              \"country_map\", \"country_route\", \"trip_corridor\",",
              "              \"conus_map\", \"place_pack\", \"trail_pack\", \"topo_pack\",",
              "          }",
              "          or asset_type.startswith(\"trailhead_\")",
              "      )",
              "      if trailhead_owned_free:",
              "          db.execute(",
              "              \"INSERT OR IGNORE INTO offline_downloads (user_id,asset_type,region_id,cost,free_used,created_at) VALUES (?,?,?,?,?,?)\",",
              "              (user_id, asset_type, region_id, 0, 0, now),",
              "          )",
              "          db.commit()",
              "          return {\"authorized\": True, \"charged\": 0, \"free_used\": False, \"credits\": user.get(\"credits\", 0)}",
            ])
            text = regex_required(
              text,
              r"      free_allowed = asset_type == \"state_route\" and region_id != \"conus\"[\s\S]*?return \{\"authorized\": True, \"charged\": 0, \"free_used\": True, \"credits\": user\.get\(\"credits\", 0\)\}",
              free_block,
              path,
            )
          write(path, text, original)
          # Backend compatibility aliases and visible tier name.
          path = "dashboard/server.py"
          text = original = read(path)
          text = text.replace('"tier_name": "Extreme Explorer"', '"tier_name": "Explorer"')
          text = text.replace("Extreme Explorer access required", "Explorer access required")
          text = text.replace("Extreme Explorer", "Explorer")
          lines = text.splitlines()
          patched: list[str] = []
          for line in lines:
            match = re.match(r'(\s*@app\.(?:get|post|put|delete|patch)\()([\"\'])/api/extreme/([^\"\']+)([\"\'])(.*)$', line)
            if match:
              alias = f'{match.group(1)}{match.group(2)}/api/explorer/{match.group(3)}{match.group(4)}{match.group(5)}'
              if not patched or patched[-1] != alias:
                patched.append(alias)
            patched.append(line)
          text = "\n".join(patched) + ("\n" if original.endswith("\n") else "")
          write(path, text, original)
          # Mobile API compatibility aliases and visible type name.
          path = "mobile/lib/api.ts"
          text = original = read(path)
          text = text.replace("tier_name: 'Extreme Explorer' | string;", "tier_name: 'Explorer' | string;")
          if "getExplorerConfig" not in text:
            text = replace_optional(
              text,
              "  getExtremeConfig: () => req<ExtremeConfig>('/api/extreme/config'),",
              "  getExplorerConfig: () => req<ExtremeConfig>('/api/explorer/config'),\n  getExtremeConfig: () => req<ExtremeConfig>('/api/extreme/config'),",
              path,
            )
          if "authorizeExplorerSession" not in text:
            text = replace_optional(
              text,
              "  authorizeExtremeSession: (data: ExtremeSessionAuthorizeRequest) =>\n    req<ExtremeSessionAuthorizeResponse>('/api/extreme/session/authorize', {",
              "  authorizeExplorerSession: (data: ExtremeSessionAuthorizeRequest) =>\n    req<ExtremeSessionAuthorizeResponse>('/api/explorer/session/authorize', {\n      method: 'POST',\n      body: JSON.stringify(data),\n    }),\n  authorizeExtremeSession: (data: ExtremeSessionAuthorizeRequest) =>\n    req<ExtremeSessionAuthorizeResponse>('/api/extreme/session/authorize', {",
              path,
            )
          write(path, text, original)
          # Visible copy cleanup.
          for path in [
            "mobile/components/map/MapLayerSheetContent.tsx",
            "mobile/components/map/MapStyleSheet.tsx",
            "mobile/app/extreme-explorer.tsx",
            "dashboard/admin.html",
          ]:
            p = Path(path)
            if not p.exists():
              warnings.append(f"Skipping missing optional copy file: {path}")
              continue
            text = original = p.read_text()
            text = text.replace("Extreme Explorer", "Explorer")
            text = text.replace("EXTREME", "EXPLORER")
            text = text.replace("Extreme", "Explorer")
            text = text.replace("Beta locked", "Explorer")
            text = text.replace("PREMIUM MAP", "MAP STYLES")
            text = text.replace("Premium Map", "Map Styles")
            text = text.replace("premium map", "map styles")
            write(path, text, original)
          # Smoke should not become a visible broken safety layer from this patch.
          for path in ["mobile/components/map/MapLayerSheetContent.tsx", "mobile/components/NativeMap/index.tsx"]:
            p = Path(path)
            if p.exists() and ("Smoke" in p.read_text() or "showSmoke" in p.read_text()):
              warnings.append(f"Smoke references still need source verification in {path}")
          # Verification guardrails.
          failures: list[str] = []
          for path in ["mobile/components/map/MapLayerSheetContent.tsx", "mobile/components/map/MapStyleSheet.tsx", "mobile/app/extreme-explorer.tsx", "dashboard/admin.html"]:
            p = Path(path)
            if not p.exists():
              continue
            text = p.read_text()
            for term in ["Extreme Explorer", "EXTREME", "Beta locked", "PREMIUM MAP"]:
              if term in text:
                failures.append(f"{term!r} remains in {path}")
          routing = Path("mobile/components/NativeMap/routing.ts").read_text()
          if "const wantsMapboxFirst" not in routing:
            failures.append("routing.ts did not add explicit traffic-first guard")
          if "() => fetchValhalla(pairs, fromIdx, routeOpts),\n        () => fetchMapbox" not in routing:
            failures.append("routing.ts does not show Trailhead Valhalla before Mapbox")
          store = Path("db/store.py").read_text()
          if "EXPLORER_PLAN_TYPES" not in store:
            failures.append("db/store.py is missing Explorer plan aliases")
          if "trailhead_owned_free" not in store:
            failures.append("db/store.py is missing Trailhead-owned offline free path")
          server = Path("dashboard/server.py").read_text()
          if '"tier_name": "Explorer"' not in server:
            failures.append("dashboard/server.py is missing Explorer tier name")
          if '"/api/extreme/config"' in server and '"/api/explorer/config"' not in server:
            failures.append("dashboard/server.py is missing /api/explorer compatibility route")
          if failures:
            print("Patch verification failed:")
            for item in failures:
              print(f"- {item}")
            raise SystemExit(1)
          print("Explorer map access patch applied.")
          if changed_files:
            print("Changed files:")
            for path in sorted(changed_files):
              print(f"- {path}")
          if warnings:
            print("Warnings:")
            for item in warnings:
              print(f"- {item}")
      - name: Relocate Explorer map styles out of Extreme gate
        shell: python
        run: |
          from pathlib import Path
          def patch(path, old, new, required=True):
              p = Path(path)
              if not p.exists():
                  if required:
                      raise SystemExit(f"[style-relocation] missing file: {path}")
                  return
              text = p.read_text()
              if new in text:
                  return
              if old not in text:
                  if required:
                      raise SystemExit(f"[style-relocation] anchor not found in {path}: {old[:90]!r}")
                  return
              p.write_text(text.replace(old, new, 1))
          MAP = "mobile/app/(tabs)/map.tsx"
          MLS = "mobile/components/map/MapLayerSheetContent.tsx"
          MSS = "mobile/components/map/MapStyleSheet.tsx"
          # 1. Anyone can enter premium map style mode (drop the entitlement paywall).
          patch(MAP,
              "\n".join([
                  "  function selectExtremeMapLayer() {",
                  "    if (!extremeMapLayerEntitled) {",
                  "      setPaywallCode('extreme_hidden_beta');",
                  "      setPaywallMessage('Explorer includes EXTREME terrain previews. Premium beta tools stay locked to Extreme accounts.');",
                  "      setPaywallVisible(true);",
                  "      return;",
                  "    }",
                  "    if (extremeMapboxPending) {",
              ]),
              "\n".join([
                  "  function selectExtremeMapLayer() {",
                  "    if (extremeMapboxPending) {",
              ]))
          # 2. Selecting a premium style activates premium rendering for everyone.
          patch(MAP,
              "\n".join([
                  "    onPress: () => {",
                  "      setPremiumMapStyle(option.id);",
                  "      api.logExtremeLedger({",
                  "        event_type: 'mapbox_style_selected',",
              ]),
              "\n".join([
                  "    onPress: () => {",
                  "      applyMapLayer('extreme');",
                  "      setPremiumMapStyle(option.id);",
                  "      api.logExtremeLedger({",
                  "        event_type: 'mapbox_style_selected',",
              ]))
          # 3. Premium style section + Extreme card available to all (mapbox supported + token).
          patch(MAP, "premiumMapVisible={extremeMapLayerActive}", "premiumMapVisible={extremeMapboxSupported && !!mapboxToken}")
          patch(MAP, "extremeMapLayerSelectable={extremeMapLayerAvailable}", "extremeMapLayerSelectable={extremeMapboxSupported}")
          patch(MAP, "extremeSelectable={extremeMapLayerAvailable}", "extremeSelectable={extremeMapboxSupported}")
          # 4. Keep navigation provider Explorer-only (free style users still route via Trailhead).
          patch(MAP,
              "routeProviderMode={extremeMapLayerActive ? 'extreme-mapbox' : 'trailhead'}",
              "routeProviderMode={extremeMapLayerActive && !!extremeConfig?.feature_flags?.navigation ? 'extreme-mapbox' : 'trailhead'}")
          patch(MAP,
              "route_provider: extremeMapLayerActive ? 'extreme-mapbox' : 'trailhead',",
              "route_provider: extremeMapLayerActive && !!extremeConfig?.feature_flags?.navigation ? 'extreme-mapbox' : 'trailhead',")
          # 5. Keep base POI + nearby place feeds for free style users (suppress only with Explorer search).
          patch(MAP,
              "\n".join([
                  "  function fetchPois(center: { lat: number; lng: number }, radius = 28, categoriesOverride?: string) {",
                  "    if (extremeMapLayerActive) {",
              ]),
              "\n".join([
                  "  function fetchPois(center: { lat: number; lng: number }, radius = 28, categoriesOverride?: string) {",
                  "    if (extremeMapLayerActive && !!extremeConfig?.feature_flags?.search) {",
              ]))
          patch(MAP,
              "\n".join([
                  "    if (!key || center?.lat == null || center?.lng == null || !isFinite(center.lat) || !isFinite(center.lng)) return;",
                  "    if (extremeMapLayerActive) {",
              ]),
              "\n".join([
                  "    if (!key || center?.lat == null || center?.lng == null || !isFinite(center.lat) || !isFinite(center.lng)) return;",
                  "    if (extremeMapLayerActive && !!extremeConfig?.feature_flags?.search) {",
              ]))
          # 6. Drop the misleading lock icons now that the style cards are free.
          patch(MLS, 'name="lock-closed" size={15} color="#ef4444" />}', 'name="ellipse-outline" size={15} color="#ef4444" />}', required=False)
          patch(MSS, "name={extremeActive ? 'checkmark-circle' : 'lock-closed'}", "name={extremeActive ? 'checkmark-circle' : 'ellipse-outline'}", required=False)
          # 7. Card subtitle should not claim "Not available yet" now that the styles are free.
          patch(MAP,
              "\n".join([
                  "  const extremeMapLayerSub = !extremeMapLayerEntitled",
                  "    ? 'Not available yet'",
                  "    : extremeMapboxPending",
                  "      ? 'Checking device'",
                  "      : extremeMapboxSupported",
                  "        ? (extremeConfig?.enabled ? 'Premium Mapbox mode' : 'Explorer 3D terrain')",
                  "        : 'Android fallback';",
              ]),
              "\n".join([
                  "  const extremeMapLayerSub = extremeMapboxPending",
                  "    ? 'Checking device'",
                  "    : !extremeMapboxSupported",
                  "      ? 'Android fallback'",
                  "      : (extremeConfig?.enabled ? 'Premium Mapbox mode' : 'Mapbox map styles');",
              ]))
          # Verification.
          map_text = Path(MAP).read_text()
          failures = []
          if "setPaywallCode('extreme_hidden_beta')" in map_text:
              failures.append("selectExtremeMapLayer paywall still present")
          if "'Not available yet'" in map_text:
              failures.append("Extreme card subtitle still says 'Not available yet'")
          for needle in [
              "applyMapLayer('extreme');\n      setPremiumMapStyle(option.id);",
              "premiumMapVisible={extremeMapboxSupported && !!mapboxToken}",
              "extremeMapLayerSelectable={extremeMapboxSupported}",
              "routeProviderMode={extremeMapLayerActive && !!extremeConfig?.feature_flags?.navigation ? 'extreme-mapbox' : 'trailhead'}",
              "route_provider: extremeMapLayerActive && !!extremeConfig?.feature_flags?.navigation ? 'extreme-mapbox' : 'trailhead',",
              "if (extremeMapLayerActive && !!extremeConfig?.feature_flags?.search) {",
              "const extremeMapLayerSub = extremeMapboxPending",
          ]:
              if needle not in map_text:
                  failures.append(f"missing expected change: {needle[:70]!r}")
          if failures:
              print("Style relocation verification failed:")
              for item in failures:
                  print(f"- {item}")
              raise SystemExit(1)
          print("Explorer map styles relocated out of Extreme gate.")
      - name: Show source diff
        shell: bash
        run: |
          git diff -- \
            'mobile/app/(tabs)/map.tsx' \
            mobile/components/NativeMap/types.ts \
            mobile/components/NativeMap/routing.ts \
            mobile/components/NativeMap/index.tsx \
            mobile/components/NativeMap/mapStyle.ts \
            mobile/components/map/MapLayerSheetContent.tsx \
            mobile/components/map/MapStyleSheet.tsx \
            mobile/app/extreme-explorer.tsx \
            mobile/lib/api.ts \
            dashboard/server.py \
            dashboard/admin.html \
            db/store.py
      - name: Commit source patch when changed
        shell: bash
        run: |
          if git diff --quiet -- \
            'mobile/app/(tabs)/map.tsx' \
            mobile/components/NativeMap/types.ts \
            mobile/components/NativeMap/routing.ts \
            mobile/components/NativeMap/index.tsx \
            mobile/components/NativeMap/mapStyle.ts \
            mobile/components/map/MapLayerSheetContent.tsx \
            mobile/components/map/MapStyleSheet.tsx \
            mobile/app/extreme-explorer.tsx \
            mobile/lib/api.ts \
            dashboard/server.py \
            dashboard/admin.html \
            db/store.py; then
            echo "No Explorer map access source changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            'mobile/app/(tabs)/map.tsx' \
            mobile/components/NativeMap/types.ts \
            mobile/components/NativeMap/routing.ts \
            mobile/components/NativeMap/index.tsx \
            mobile/components/NativeMap/mapStyle.ts \
            mobile/components/map/MapLayerSheetContent.tsx \
            mobile/components/map/MapStyleSheet.tsx \
            mobile/app/extreme-explorer.tsx \
            mobile/lib/api.ts \
            dashboard/server.py \
            dashboard/admin.html \
            db/store.py
          git commit -m "${{ github.event.inputs.message }}"
          git push origin HEAD:${{ github.ref_name }}
      - name: Stop before OTA when requested
        if: ${{ github.event.inputs.channel == 'none' }}
        run: echo "Patched source only; OTA publish skipped."
      - name: Check EXPO_TOKEN for OTA
        if: ${{ github.event.inputs.channel != 'none' }}
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN. Add it in GitHub repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
      - name: Setup Node
        if: ${{ github.event.inputs.channel != 'none' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Setup Expo and EAS
        if: ${{ github.event.inputs.channel != 'none' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install mobile dependencies
        if: ${{ github.event.inputs.channel != 'none' }}
        working-directory: mobile
        run: npm ci
      - name: Typecheck mobile app
        if: ${{ github.event.inputs.channel != 'none' }}
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Publish production OTA
        if: ${{ github.event.inputs.channel == 'production' || github.event.inputs.channel == 'both' }}
        working-directory: mobile
        run: eas update --channel production --message "${{ github.event.inputs.message }}" --non-interactive
      - name: Publish preview OTA
        if: ${{ github.event.inputs.channel == 'preview' || github.event.inputs.channel == 'both' }}
        working-directory: mobile
        run: eas update --channel preview --message "${{ github.event.inputs.message }}" --non-interactive
      
